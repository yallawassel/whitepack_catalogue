<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>WhitePack Catalogue</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f7f6;
}

header{
background:#2e7d32;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
}

.categoryGrid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
}

.category{
position:relative;
cursor:pointer;
border-radius:14px;
overflow:hidden;
}

.category img{
width:100%;
height:180px;
object-fit:cover;
}

.category span{
position:absolute;
bottom:0;
left:0;
right:0;
padding:10px;
background:rgba(0,0,0,.6);
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:10px;
border-radius:14px;
box-shadow:0 6px 15px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#2e7d32;
font-weight:bold;
}

.cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:14px;
border-radius:50px;
cursor:pointer;
}

.cartPanel{
position:fixed;
right:-350px;
top:0;
width:320px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,.2);
padding:20px;
transition:.3s;
overflow:auto;
}

.cartPanel.open{
right:0;
}

.remove{
color:red;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h2>White Pack</h2>

<button onclick="toggleLang()">AR / EN</button>

</header>

<div class="container">

<input id="search" placeholder="Search products">

<button onclick="showAll()" style="
margin-top:10px;
padding:6px 12px;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
">
Show All Products
</button>

<div id="categoryGrid" class="categoryGrid"></div>

<div id="productGrid" class="grid"></div>

</div>

<div class="cartBtn" onclick="toggleCart()">
🛒 (<span id="cartCount">0</span>)
</div>

<div id="cartPanel" class="cartPanel">

<button onclick="toggleCart()" style="
position:absolute;
top:10px;
right:10px;
background:#eee;
border:none;
padding:6px 10px;
cursor:pointer;
">
✕
</button>

<h3>Order</h3>

<div id="cartItems"></div>

<h3>Total: <span id="cartTotal">0</span> USD</h3>

<button onclick="sendOrder()">Send WhatsApp Order</button>

</div>

<script>

const DATA_URL="products.json"
const CAT_URL="categories.json"

let products=[]
let categories=[]
let cart=[]
let lang="en"
let currentCategory=""

async function load(){

const p=await fetch(DATA_URL)
products=await p.json()

const c=await fetch(CAT_URL)
categories=await c.json()

renderCategories()
renderProducts()

}

function renderCategories(){

const grid=document.getElementById("categoryGrid")

grid.innerHTML=""

categories.forEach(cat=>{

const div=document.createElement("div")
div.className="category"

div.innerHTML=`
<img src="assets/images/categories/${cat.image}">
<span>${cat.name}</span>
`

div.onclick=()=>{

 currentCategory = cat.name
 renderProducts()

}

grid.appendChild(div)

})

}

function renderProducts(){

const grid=document.getElementById("productGrid")
const q=document.getElementById("search").value.toLowerCase()

grid.innerHTML=""

products
.filter(p=>{

const matchSearch=!q||p.name.toLowerCase().includes(q)

const matchCat=!currentCategory || p.category===currentCategory

return matchSearch && matchCat

})
.forEach((p,i)=>{

const name=lang==="ar"?p.name_ar||p.name:p.name

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<img src="assets/images/products/${p.image}">

<h4>${name}</h4>

<div class="price">${p.price} USD</div>

<input id="qty-${i}" type="number" value="1" min="1">

<button onclick="addToCart(${i})">Add</button>

`

grid.appendChild(card)

})

}
function addToCart(i){

const qty=parseInt(document.getElementById("qty-"+i).value)||1
const p=products[i]

cart.push({name:p.name,qty:qty,price:p.price})

updateCart()

}

function updateCart(){

const items=document.getElementById("cartItems")
items.innerHTML=""

let total=0

cart.forEach((item,i)=>{

const line=item.qty*item.price
total+=line

items.innerHTML+=`
<div>
${item.qty} x ${item.name}
${line}$
<span class="remove" onclick="removeItem(${i})">✕</span>
</div>
`

})

document.getElementById("cartTotal").innerText=total
document.getElementById("cartCount").innerText=cart.length

}

function removeItem(i){

cart.splice(i,1)
updateCart()

}

function toggleCart(){

document.getElementById("cartPanel").classList.toggle("open")

}

function sendOrder(){

let msg="New Order:%0A%0A"
let total=0

cart.forEach(i=>{

const line=i.qty*i.price
total+=line

msg+=`${i.qty} x ${i.name} - ${line} USD%0A`

})

msg+=`%0ATotal: ${total} USD`

window.open(`https://wa.me/96170333029?text=${msg}`)

}

function toggleLang(){

lang=lang==="en"?"ar":"en"
renderProducts()

}
function showAll(){
 currentCategory=""
 renderProducts()
}

document.getElementById("search").addEventListener("input",renderProducts)

load()

</script>

</body>
</html>
