<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>WhitePack Catalogue</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial;
background:#f5f7f6;
overflow-x:hidden;
}

header{
background:#2e7d32;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{margin:0;font-size:20px}

.langBtn{
background:white;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:15px;
}

#search{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
}

@media(max-width:600px){
.grid{grid-template-columns:repeat(2,1fr)}
}

.card{
background:white;
padding:12px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
text-align:center;
}

.card img{
width:100%;
height:160px;
object-fit:contain;
background:white;
}

.price{
color:#2e7d32;
font-weight:bold;
}

.qtyRow{
display:flex;
justify-content:center;
gap:5px;
margin-top:6px;
}

.qtyRow input{
width:45px;
text-align:center;
}

.addBtn{
background:#2e7d32;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:14px;
border-radius:40px;
cursor:pointer;
}

.cartModal{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center;
}

.cartPanel{
background:white;
padding:15px;
border-radius:10px;
width:90%;
max-width:450px;
}

.remove{
color:red;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<h2>White Pack</h2>
<button class="langBtn" onclick="toggleLang()" id="langBtn">AR</button>
</header>

<div class="container">

<input id="search" placeholder="Search products">

<div id="grid" class="grid"></div>

</div>

<div class="cartBtn" onclick="openCart()">
🛒 <span id="cartCount">0</span>
</div>

<div id="cartModal" class="cartModal">
<div class="cartPanel">

<h3>Order</h3>

<div id="cartItems"></div>

<input id="customerName" placeholder="Your name" style="width:100%;padding:8px;margin-top:10px">

<h3>Total: <span id="cartTotal">0</span> USD</h3>

<button onclick="clearCart()">Clear</button> <button onclick="sendOrder()">Send WhatsApp</button>

</div>
</div>

<script>

const DATA_URL="products.json"

let products=[]
let cart=JSON.parse(localStorage.getItem("whitepack_cart"))||[]
let lang="en"

async function load(){

const res=await fetch(DATA_URL)
products=await res.json()

applyCategoryFromURL()

renderProducts()
updateCart()

}

function applyCategoryFromURL(){

const params=new URLSearchParams(window.location.search)
const cat=params.get("cat")

if(cat){
products=products.filter(p=>p.category===cat)
}

}

function renderProducts(){

const grid=document.getElementById("grid")
const q=document.getElementById("search").value.toLowerCase()

grid.innerHTML=""

products
.filter(p=>{

const name=lang==="ar"?p.name_ar||p.name:p.name
return !q||name.toLowerCase().includes(q)

})
.forEach((p,i)=>{

const name=lang==="ar"?p.name_ar||p.name:p.name

grid.innerHTML+=`

<div class="card">

<img src="assets/images/products/${p.image}">

<h4>${name}</h4>

<div class="price">${p.price} USD</div>

<div class="qtyRow">
<input id="qty-${i}" type="number" value="1" min="1">
<button class="addBtn" onclick="addToCart(${i})">
${lang==="ar"?"إضافة":"Add"}
</button>
</div>

</div>

`

})

}

function addToCart(i){

const qty=parseInt(document.getElementById("qty-"+i).value)||1
const p=products[i]

const name=lang==="ar"?p.name_ar||p.name:p.name

cart.push({name,qty,price:p.price})

updateCart()

}

function updateCart(){

const items=document.getElementById("cartItems")
items.innerHTML=""

let total=0

cart.forEach((item,i)=>{

const line=item.qty*item.price
total+=line

items.innerHTML+=`
<div>
${item.qty} x ${item.name}
${line}$
<span class="remove" onclick="removeItem(${i})">✕</span>
</div>
`

})

document.getElementById("cartTotal").innerText=total
document.getElementById("cartCount").innerText=cart.length

localStorage.setItem("whitepack_cart",JSON.stringify(cart))

}

function removeItem(i){
cart.splice(i,1)
updateCart()
}

function clearCart(){
cart=[]
updateCart()
}

function openCart(){
document.getElementById("cartModal").style.display="flex"
}

function sendOrder(){

let msg="New Order:%0A"

const name=document.getElementById("customerName").value
if(name) msg+=`Name: ${name}%0A%0A`

let total=0

cart.forEach(i=>{

const line=i.qty*i.price
total+=line

msg+=`${i.qty} x ${i.name} - ${line} USD%0A`

})

msg+=`%0ATotal: ${total} USD`

window.open(`https://wa.me/96170333029?text=${msg}`)

}

function toggleLang(){

if(lang==="en"){
lang="ar"
document.body.style.direction="rtl"
document.getElementById("langBtn").innerText="EN"
}else{
lang="en"
document.body.style.direction="ltr"
document.getElementById("langBtn").innerText="AR"
}

renderProducts()

}

document.getElementById("search").addEventListener("input",renderProducts)

load()

</script>

</body>
</html>
