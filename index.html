<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WhitePack Catalogue</title>

<style>

:root{
 --green:#2e7d32;
 --green2:#66bb6a;
 --bg:#f5f7f6;
}

body{
 margin:0;
 font-family:Arial;
 background:var(--bg);
}

header{
 background:linear-gradient(90deg,#a5d6a7,#2e7d32);
 padding:15px;
 display:flex;
 align-items:center;
}

header h2{
 margin:0;
}

.container{
 padding:25px;
}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
 gap:20px;
}

.card{
 background:white;
 border-radius:14px;
 padding:12px;
 box-shadow:0 8px 20px rgba(0,0,0,.08);
 display:flex;
 flex-direction:column;
}

.card img{
 width:100%;
 height:180px;
 object-fit:cover;
 border-radius:10px;
}

.price{
 font-weight:bold;
 color:var(--green);
}

.qty{
 display:flex;
 gap:6px;
 margin-top:6px;
}

.qty input{
 width:45px;
 text-align:center;
}

button{
 border:none;
 cursor:pointer;
}

.add{
 background:linear-gradient(90deg,var(--green2),var(--green));
 color:white;
 padding:6px;
 border-radius:8px;
}

.cartBtn{
 position:fixed;
 bottom:20px;
 right:20px;
 background:#25D366;
 color:white;
 padding:14px 18px;
 border-radius:50px;
 font-size:16px;
 box-shadow:0 8px 20px rgba(0,0,0,.2);
}

.cartPanel{
 position:fixed;
 right:-400px;
 top:0;
 width:320px;
 height:100%;
 background:white;
 box-shadow:-4px 0 20px rgba(0,0,0,.2);
 padding:20px;
 transition:.3s;
 overflow:auto;
}

.cartPanel.open{
 right:0;
}

.cartItem{
 border-bottom:1px solid #eee;
 padding:8px 0;
 display:flex;
 justify-content:space-between;
}

.remove{
 color:red;
 cursor:pointer;
}

.orderBtn{
 width:100%;
 background:#25D366;
 color:white;
 padding:12px;
 border-radius:10px;
 margin-top:10px;
}

</style>
</head>

<body>

<header>
<h2>White Pack</h2>
</header>

<div class="container">
<div id="grid" class="grid"></div>
</div>

<button class="cartBtn" onclick="toggleCart()">
🛒 Cart (<span id="cartCount">0</span>)
</button>

<div id="cartPanel" class="cartPanel">

<h3>Your Order</h3>

<div id="cartItems"></div>

<h3>Total: <span id="cartTotal">0</span> USD</h3>

<button class="orderBtn" onclick="sendOrder()">
Send Order on WhatsApp
</button>

</div>

<script>

const DATA_URL="products.json"

let products=[]
let cart=[]

async function loadProducts(){

const r=await fetch(DATA_URL+"?t="+Date.now())
products=await r.json()

renderProducts()

}

function renderProducts(){

const grid=document.getElementById("grid")
grid.innerHTML=""

products.forEach((p,i)=>{

const img=p.image
?`assets/images/products/${p.image}`
:"assets/images/placeholder.jpg"

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<img src="${img}">

<h4>${p.name}</h4>

<div class="price">${p.price} USD</div>

<div class="qty">
<input id="qty-${i}" type="number" value="1" min="1">
<button class="add" onclick="addToCart(${i})">
Add
</button>
</div>

`

grid.appendChild(card)

})

}

function addToCart(i){

const qty=parseInt(document.getElementById("qty-"+i).value)||1
const p=products[i]

cart.push({
name:p.name,
qty:qty,
price:p.price
})

updateCart()

}

function updateCart(){

const items=document.getElementById("cartItems")
const count=document.getElementById("cartCount")
const totalEl=document.getElementById("cartTotal")

items.innerHTML=""

let total=0

cart.forEach((item,index)=>{

const line=item.qty*item.price
total+=line

const div=document.createElement("div")
div.className="cartItem"

div.innerHTML=`
${item.qty} x ${item.name}
<span>
${line}$
 <span class="remove" onclick="removeItem(${index})">✕</span>
</span>
`

items.appendChild(div)

})

count.innerText=cart.length
totalEl.innerText=total

}

function removeItem(i){

cart.splice(i,1)
updateCart()

}

function toggleCart(){

document.getElementById("cartPanel").classList.toggle("open")

}

function sendOrder(){

if(cart.length===0){

alert("Cart is empty")
return

}

let message="New Order:%0A%0A"
let total=0

cart.forEach(item=>{

const line=item.qty*item.price
total+=line

message+=`${item.qty} x ${item.name} - ${line} USD%0A`

})

message+=`%0ATotal: ${total} USD`

const phone="96170333029"

window.open(`https://wa.me/${phone}?text=${message}`)

}

loadProducts()

</script>

</body>
</html>
